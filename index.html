<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiSense Dashboard</title>
    <style>
        .screen { display: none; }
        .screen.active { display: block; }
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input, button { display: block; margin: 10px 0; padding: 12px; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="screen-auth-gateway" class="screen active">
        <h1>Farmer Login</h1>
        <form id="authForm" onsubmit="executeAuthAction(event)">
            <input type="text" id="authUsername" placeholder="Mobile Number" required>
            <input type="password" id="authPassword" placeholder="Password" required>
            <button type="submit" id="authSubmitBtn">Request OTP</button>
        </form>
    </div>

    <div id="appMainContainer" class="screen">
        <h2>Dashboard</h2>
        <p>Login Successful!</p>
        <button onclick="location.reload()">Logout</button>
    </div>

    <script>
        async function executeAuthAction(e) {
            e.preventDefault();
            const username = document.getElementById('authUsername').value;
            const password = document.getElementById('authPassword').value;
            const btn = document.getElementById('authSubmitBtn');

            btn.innerText = "Processing...";
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('screen-auth-gateway').classList.remove('active');
                    document.getElementById('appMainContainer').classList.add('active');
                } else {
                    alert("Error: " + (data.detail || "Login failed"));
                }
            } catch (err) {
                alert("Connection Error. Check the backend server.");
            } finally {
                btn.innerText = "Request OTP";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
